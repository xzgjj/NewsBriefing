# NewsBriefing 配置文件
# 版本: v1.0
# 所有密钥通过环境变量注入，禁止硬编码

version: "1.0"
user_id: "single_user"

# ============================================
# 简报时间
# ============================================
schedule:
  timezone: "Asia/Shanghai"
  briefings:
    morning:
      enabled: true
      time: "08:00"
      label: "早间简报"
      include_market_data: false  # Phase 1 暂不集成市场数据
    midday:
      enabled: false
      time: "12:30"
      label: "午间快报"
      trigger: "anomaly_only"


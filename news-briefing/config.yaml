# ============================================
# 搜索配置（Tavily Layer 2 补充 + 占Layer1失效缺口）
# ============================================
search:
  primary: "tavily"
  fallback_chain: ["google_news_rss"]
  daily_limit: 15
  topics:
    morning:
      - "最新 AI 大模型 发布 更新 GPT Claude DeepSeek Gemini Llama 版本 能力"
      - "科技企业 最新 融资 收购 合作 供应链 人事变动"

  # Tier 3 默认不启用
  tier3:
    enabled_by_default: false
    sources: []

# ============================================
# 搜索配置（Layer 2 补充）
# ============================================
search:
  primary: "tavily"
  fallback_chain: ["google_news_rss"]
  daily_limit: 15
  topics:
    morning:
      - "中国政策"
      - "金融科技 FinTech"
      - "AI 大模型最新发布"
      - "全球市场重要动态"

# ============================================
# AI/LLM 配置
# ============================================
llm:
  provider: "deepseek"
  fast_model: "deepseek-chat"  # DeepSeek V3/V4 通用聊天模型
  pro_model: "deepseek-chat"
  timeout: 45  # 全文摘要需要更长时间
  fallback: "rule_based"
  safety_prompt_append: |
    你是一个客观中立的新闻摘要助手。你必须:
    1. 只陈述原文中的事实，不添加个人评价或预测
    2. 保留所有关键数字，不得近似或编造
    3. 涉及金融数据时必须包含具体数值、时间和单位
    4. 如果原文使用了推测性语言，摘要中必须保留这种不确定性
    5. 不确定的信息必须标注来源，而不是陈述为事实
    6. 不使用"暴涨""暴跌""震惊""重磅"等情绪化词汇
    7. 不给投资建议
    8. 如果原文含有明显错误或矛盾，标注"原文信息存在不一致"

# ============================================
# 投递配置
# ============================================
delivery:
  primary:
    channel: "feishu"
    method: "openclaw_gateway"
    gateway_url: "http://127.0.0.1:18790"
  fallback:
    channel: "feishu"
    method: "feishu_direct"
  retry:
    max_attempts: 3
    backoff_seconds: [60, 120, 240]
  archive:
    enabled: true
    path: "./data/archive/"
    format: "markdown"

# ============================================
# 反误导/去毒化
# ============================================
anti_misinfo:
  detoxify_titles: true
  sensational_keywords:
    - "暴涨"
    - "暴跌"
    - "狂飙"
    - "雪崩"
    - "崩盘"
    - "震惊"
    - "重磅"
    - "疯传"
    - "刷屏"
  uncertainty_markers:
    - "或将"
    - "可能"
    - "据传"
    - "消息人士"
    - "知情人士"
  require_cross_validation_for:
    - "tier3"
    - "single_tier2_source"
  ai_claims_verification:
    vendor_claimed_label: "⚠️ 厂商自称"
    arxiv_label: "📄 预印本"
    third_party_verified_label: "✅ 已获第三方验证"
